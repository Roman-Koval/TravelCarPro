<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FFB74D" />

  <title>TravelCar</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="./manifest.webmanifest" />

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TravelCar" />

  <!-- Icons -->
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="icon" type="image/png" href="./icons/icon-192.png" />

  <!-- Splash screens -->
  <link rel="apple-touch-startup-image" href="./splash/splash-640x1136.png" media="(device-width: 320px)" />
  <link rel="apple-touch-startup-image" href="./splash/splash-750x1334.png" media="(device-width: 375px)" />
  <link rel="apple-touch-startup-image" href="./splash/splash-1125x2436.png" media="(device-width: 375px) and (-webkit-device-pixel-ratio: 3)" />

  <!-- Styles -->
  <link rel="stylesheet" href="./styles/base.css" />
  <link rel="stylesheet" href="./styles/components.css" />
  <link rel="stylesheet" href="./styles/screens.css" />
  <link rel="stylesheet" href="./styles/animations.css" />
  <link rel="stylesheet" href="./styles/dark.css" />
</head>
<body>
  <div id="app"></div>

  <!-- App -->
  <script type="module" src="./src/app.js"></script>

  <!-- SW auto-update -->
  <script src="./sw-update.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./service-worker.js");
    }
  </script>
</body>
</html>
