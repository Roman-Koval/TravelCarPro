<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelCar Pro</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>🚗 TravelCar</header>

<div class="glass big">
  <div>Баланс</div>
  <div id="total">€0</div>
</div>

<div class="glass form">
  <input id="amount" placeholder="Сумма">
  
  <select id="currency">
    <option>EUR</option>
    <option>TRY</option>
    <option>USD</option>
    <option>GBP</option>
    <option>CHF</option>
  </select>

  <select id="category">
    <option value="food">🍔 Еда</option>
    <option value="fuel">⛽ Топливо</option>
    <option value="hotel">🏨 Жильё</option>
    <option value="other">📦 Прочее</option>
  </select>

  <input id="comment" placeholder="Комментарий">
</div>

<canvas id="chart"></canvas>

<div id="list"></div>

<div id="map"></div>

<div class="nav">
  <button onclick="voice()">🎤</button>
  <button onclick="save()">➕</button>
</div>

<script src="app.js"></script>

</body>
</html>
